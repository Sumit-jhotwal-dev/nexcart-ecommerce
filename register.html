<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - NexCart</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    

<section id="auth">

    <h2 style="color:blue;">Create Account</h2>
    

    <form id="register-form"
      action="register.php"
      method="POST">

    <input type="text"
    id="reg-name"
    name="fullname"
    placeholder="Full Name"
    required>

    <input type="email"
    id="reg-email"
    name="email"
    placeholder="Email"
    required>

    <input type="password"
    id="reg-password"
    name="password"
    placeholder="Password"
    required>

    <button type="submit">
        Register
    </button>

</form>
  <p class="register-link">
    <a href="login.html">Login Here</a>
</p>

</section>

<!--<script src="js/register.js"></script>-->

</body>
</html>
