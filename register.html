<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - NexCart</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section id="auth">

    <h2>Create Account</h2>

    <form id="register-form">

        <input type="text"
        id="reg-name"
        placeholder="Full Name"
        required>

        <input type="email"
        id="reg-email"
        placeholder="Email"
        required>

        <input type="password"
        id="reg-password"
        placeholder="Password"
        required>

        <button type="submit">
            Register
        </button>

    </form>

</section>

<script src="js/register.js"></script>

</body>
</html>
