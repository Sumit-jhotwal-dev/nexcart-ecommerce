<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - NexCart</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section id="auth">

    <h2>Login</h2>

    <form id="login-form">

        <input type="email"
        id="login-email"
        placeholder="Email"
        required>

        <input type="password"
        id="login-password"
        placeholder="Password"
        required>

        <button type="submit">
            Login
        </button>

    </form>

</section>

<script src="js/login.js"></script>

</body>
</html>
