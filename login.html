<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - NexCart</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section id="auth">
    <h1 style="color: rgb(82, 82, 113);" >Login Now</h1>

    <h2>Login</h2>

   <form id="login-form"
      action="login.php"
      method="POST">

    <input type="email"
    id="login-email"
    name="email"
    placeholder="Email"
    required>

    <input type="password"
    id="login-password"
    name="password"
    placeholder="Password"
    required>

    <button type="submit">
        Login
    </button>

</form>
    <p class="register-link">
    Don't have an account?
    <a href="register.html">Register Here</a>
</p>

</section>


<!--<script src="js/login.js"></script>-->

</body>
</html>
